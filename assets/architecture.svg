<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500" role="img" aria-label="System architecture I work with">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="primaryNode" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="hotNode" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14532d"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>
    <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.4" opacity="0.3"/>
    </pattern>
  </defs>

  <rect width="1200" height="500" fill="url(#bg2)"/>
  <rect width="1200" height="500" fill="url(#grid2)"/>

  <!-- Title -->
  <text x="40" y="48" font-family="JetBrains Mono, Menlo, monospace" font-size="14" fill="#64748b">// systems i build</text>
  <text x="40" y="84" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#e2e8f0">Architecture I work with daily</text>
  <line x1="40" y1="100" x2="40" y2="100" stroke="#3b82f6" stroke-width="2">
    <animate attributeName="x2" values="40;160;40" dur="4s" repeatCount="indefinite"/>
  </line>

  <!-- Layer labels -->
  <g font-family="JetBrains Mono, Menlo, monospace" font-size="11" fill="#475569" text-anchor="end">
    <text x="180" y="166">CLIENT</text>
    <text x="180" y="246">EDGE</text>
    <text x="180" y="326">SERVICES</text>
    <text x="180" y="406">DATA</text>
  </g>
  <g stroke="#1e293b" stroke-width="1" stroke-dasharray="4 4">
    <line x1="200" y1="160" x2="1160" y2="160"/>
    <line x1="200" y1="240" x2="1160" y2="240"/>
    <line x1="200" y1="320" x2="1160" y2="320"/>
    <line x1="200" y1="400" x2="1160" y2="400"/>
  </g>

  <!-- CLIENT layer -->
  <g>
    <rect x="220" y="140" width="120" height="44" rx="6" fill="url(#nodeGrad)" stroke="#334155" stroke-width="1"/>
    <text x="280" y="161" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#cbd5e1">Web Client</text>
    <text x="280" y="176" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b">React</text>
  </g>
  <g>
    <rect x="540" y="140" width="120" height="44" rx="6" fill="url(#nodeGrad)" stroke="#334155" stroke-width="1"/>
    <text x="600" y="161" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#cbd5e1">Mobile / Agent</text>
    <text x="600" y="176" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b">REST clients</text>
  </g>
  <g>
    <rect x="860" y="140" width="120" height="44" rx="6" fill="url(#nodeGrad)" stroke="#334155" stroke-width="1"/>
    <text x="920" y="161" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#cbd5e1">3rd Party</text>
    <text x="920" y="176" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b">BSE · Digio · AMFI</text>
  </g>

  <!-- EDGE layer -->
  <g>
    <rect x="380" y="220" width="160" height="44" rx="6" fill="url(#primaryNode)" stroke="#3b82f6" stroke-width="1.5">
      <animate attributeName="stroke-width" values="1.5;2.5;1.5" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="460" y="241" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#e0e7ff">API Gateway</text>
    <text x="460" y="256" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#a5b4fc">Spring Cloud · Eureka</text>
  </g>
  <g>
    <rect x="660" y="220" width="160" height="44" rx="6" fill="url(#primaryNode)" stroke="#8b5cf6" stroke-width="1.5">
      <animate attributeName="stroke-width" values="1.5;2.5;1.5" dur="3s" begin="1s" repeatCount="indefinite"/>
    </rect>
    <text x="740" y="241" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#e0e7ff">Auth · Keycloak</text>
    <text x="740" y="256" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#c4b5fd">JWT · OAuth2</text>
  </g>

  <!-- SERVICES layer -->
  <g>
    <rect x="220" y="300" width="140" height="44" rx="6" fill="url(#nodeGrad)" stroke="#334155" stroke-width="1"/>
    <text x="290" y="321" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#cbd5e1">Mutual Funds</text>
    <text x="290" y="336" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b">SIP · SWP · STP</text>
  </g>
  <g>
    <rect x="380" y="300" width="140" height="44" rx="6" fill="url(#nodeGrad)" stroke="#334155" stroke-width="1"/>
    <text x="450" y="321" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#cbd5e1">Loan Mgmt</text>
    <text x="450" y="336" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b">JPA · AOP · Audit</text>
  </g>
  <g>
    <rect x="540" y="300" width="140" height="44" rx="6" fill="url(#hotNode)" stroke="#22c55e" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="610" y="321" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#bbf7d0">KYC Pipeline</text>
    <text x="610" y="336" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#22c55e">
      OCR · Validation
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
    </text>
  </g>
  <g>
    <rect x="700" y="300" width="140" height="44" rx="6" fill="url(#nodeGrad)" stroke="#334155" stroke-width="1"/>
    <text x="770" y="321" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#cbd5e1">Comms Service</text>
    <text x="770" y="336" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b">SMTP · SMS</text>
  </g>
  <g>
    <rect x="860" y="300" width="140" height="44" rx="6" fill="url(#nodeGrad)" stroke="#334155" stroke-width="1"/>
    <text x="930" y="321" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#cbd5e1">Doc Master</text>
    <text x="930" y="336" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b">AWS S3</text>
  </g>
  <g>
    <rect x="1020" y="300" width="140" height="44" rx="6" fill="url(#nodeGrad)" stroke="#334155" stroke-width="1"/>
    <text x="1090" y="321" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#cbd5e1">Workflows</text>
    <text x="1090" y="336" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b">Uber Cadence</text>
  </g>

  <!-- DATA layer -->
  <g>
    <rect x="240" y="380" width="120" height="44" rx="6" fill="url(#nodeGrad)" stroke="#334155" stroke-width="1"/>
    <text x="300" y="401" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#cbd5e1">PostgreSQL</text>
    <text x="300" y="416" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b">primary store</text>
  </g>
  <g>
    <rect x="400" y="380" width="120" height="44" rx="6" fill="url(#nodeGrad)" stroke="#334155" stroke-width="1"/>
    <text x="460" y="401" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#cbd5e1">MongoDB</text>
    <text x="460" y="416" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b">documents</text>
  </g>
  <g>
    <rect x="560" y="380" width="120" height="44" rx="6" fill="url(#nodeGrad)" stroke="#dc2626" stroke-width="1.5">
      <animate attributeName="stroke-width" values="1.5;2.5;1.5" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <text x="620" y="401" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#fca5a5">Redis</text>
    <text x="620" y="416" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#fca5a5">cache · session</text>
  </g>
  <g>
    <rect x="720" y="380" width="120" height="44" rx="6" fill="url(#nodeGrad)" stroke="#334155" stroke-width="1"/>
    <text x="780" y="401" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#cbd5e1">Hazelcast</text>
    <text x="780" y="416" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b">distributed</text>
  </g>
  <g>
    <rect x="880" y="380" width="120" height="44" rx="6" fill="url(#nodeGrad)" stroke="#334155" stroke-width="1"/>
    <text x="940" y="401" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#cbd5e1">Elastic</text>
    <text x="940" y="416" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b">logs · search</text>
  </g>

  <!-- Connecting lines -->
  <g stroke="#3b82f6" stroke-width="1.2" fill="none" opacity="0.4">
    <line x1="280" y1="184" x2="460" y2="220"/>
    <line x1="600" y1="184" x2="460" y2="220"/>
    <line x1="600" y1="184" x2="740" y2="220"/>
    <line x1="920" y1="184" x2="740" y2="220"/>
  </g>
  <g stroke="#8b5cf6" stroke-width="1.2" fill="none" opacity="0.4">
    <line x1="460" y1="264" x2="290" y2="300"/>
    <line x1="460" y1="264" x2="450" y2="300"/>
    <line x1="460" y1="264" x2="610" y2="300"/>
    <line x1="740" y1="264" x2="610" y2="300"/>
    <line x1="740" y1="264" x2="770" y2="300"/>
    <line x1="740" y1="264" x2="930" y2="300"/>
    <line x1="740" y1="264" x2="1090" y2="300"/>
  </g>
  <g stroke="#475569" stroke-width="1" fill="none" opacity="0.5">
    <line x1="290" y1="344" x2="300" y2="380"/>
    <line x1="450" y1="344" x2="300" y2="380"/>
    <line x1="450" y1="344" x2="460" y2="380"/>
    <line x1="610" y1="344" x2="620" y2="380"/>
    <line x1="610" y1="344" x2="780" y2="380"/>
    <line x1="770" y1="344" x2="620" y2="380"/>
    <line x1="930" y1="344" x2="940" y2="380"/>
    <line x1="1090" y1="344" x2="940" y2="380"/>
  </g>

  <!-- Animated request flow particles (continuous loops) -->
  <circle r="3.5" fill="#3b82f6">
    <animateMotion dur="3s" repeatCount="indefinite" path="M 280 184 L 460 220"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle r="3.5" fill="#8b5cf6">
    <animateMotion dur="3s" begin="0.5s" repeatCount="indefinite" path="M 460 264 L 610 300"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="3s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle r="3.5" fill="#22c55e">
    <animateMotion dur="3s" begin="1s" repeatCount="indefinite" path="M 610 344 L 620 380"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="3s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle r="3.5" fill="#06b6d4">
    <animateMotion dur="3.5s" begin="0.3s" repeatCount="indefinite" path="M 920 184 L 740 220"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="3.5s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle r="3.5" fill="#f59e0b">
    <animateMotion dur="2.8s" begin="1.2s" repeatCount="indefinite" path="M 740 264 L 1090 300"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2.8s" begin="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle r="3.5" fill="#ec4899">
    <animateMotion dur="3.2s" begin="0.8s" repeatCount="indefinite" path="M 1090 344 L 940 380"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="3.2s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle r="3.5" fill="#3b82f6">
    <animateMotion dur="3.5s" begin="1.5s" repeatCount="indefinite" path="M 280 184 L 460 220"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="3.5s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle r="3.5" fill="#22c55e">
    <animateMotion dur="2.5s" begin="0.2s" repeatCount="indefinite" path="M 740 264 L 610 300"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2.5s" begin="0.2s" repeatCount="indefinite"/>
  </circle>
</svg>
