<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" role="img" aria-label="Gaurav Jaiswal — Software Engineer">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="50%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff">
        <animate attributeName="stop-color" values="#ffffff;#a5b4fc;#06b6d4;#ffffff" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#a5b4fc">
        <animate attributeName="stop-color" values="#a5b4fc;#06b6d4;#3b82f6;#a5b4fc" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="340" fill="url(#bg)"/>
  <rect width="1200" height="340" fill="url(#grid)"/>

  <!-- Drifting glow blobs -->
  <ellipse cx="200" cy="170" rx="400" ry="200" fill="url(#glow1)">
    <animate attributeName="cx" values="200;350;200" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="170;130;170" dur="14s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="1000" cy="170" rx="400" ry="200" fill="url(#glow2)">
    <animate attributeName="cx" values="1000;850;1000" dur="13s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="170;200;170" dur="11s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Floating particles -->
  <g>
    <circle cx="100" cy="60" r="1.5" fill="#3b82f6">
      <animate attributeName="cy" values="60;40;60" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1100" cy="80" r="1" fill="#8b5cf6">
      <animate attributeName="cy" values="80;100;80" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;1;0.4" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="950" cy="40" r="1.2" fill="#06b6d4">
      <animate attributeName="cy" values="40;55;40" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="290" r="1" fill="#3b82f6">
      <animate attributeName="cy" values="290;270;290" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1080" cy="280" r="1.4" fill="#8b5cf6">
      <animate attributeName="cy" values="280;260;280" dur="5.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="30" r="1" fill="#06b6d4">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="295" r="1" fill="#06b6d4">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="4.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="50" r="1.3" fill="#3b82f6">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Top status bar (window chrome) -->
  <g>
    <circle cx="40" cy="36" r="6" fill="#ef4444">
      <animate attributeName="opacity" values="1;0.7;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="36" r="6" fill="#eab308"/>
    <circle cx="80" cy="36" r="6" fill="#22c55e">
      <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="110" y="40" font-family="JetBrains Mono, Menlo, monospace" font-size="12" fill="#64748b">~ /gaurav-jaiswal — zsh — 120×40</text>
  </g>
  <line x1="0" y1="60" x2="1200" y2="60" stroke="#1e293b" stroke-width="1"/>

  <!-- Terminal command lines (typed in via clip-path) -->
  <g font-family="JetBrains Mono, Menlo, monospace" font-size="14">
    <text x="40" y="92" fill="#22c55e">❯</text>
    <g clip-path="inset(0 100% 0 0)">
      <text x="60" y="92" fill="#e2e8f0">whoami</text>
      <animate attributeName="clip-path" values="inset(0 100% 0 0);inset(0 0% 0 0)" dur="0.8s" begin="0.5s" fill="freeze"/>
    </g>

    <g clip-path="inset(0 100% 0 0)">
      <text x="40" y="116" fill="#94a3b8">software-engineer · backend · distributed systems</text>
      <animate attributeName="clip-path" values="inset(0 100% 0 0);inset(0 0% 0 0)" dur="1.2s" begin="1.4s" fill="freeze"/>
    </g>
  </g>

  <!-- Big animated name -->
  <text x="40" y="210" font-family="Inter, system-ui, sans-serif" font-size="76" font-weight="800" fill="url(#nameGrad)" filter="url(#textGlow)" letter-spacing="-2">
    Gaurav Jaiswal
  </text>

  <!-- Underline accent (pulses) -->
  <line x1="40" y1="228" x2="540" y2="228" stroke="url(#accent)" stroke-width="3">
    <animate attributeName="stroke-width" values="2;4;2" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Tagline command -->
  <g font-family="JetBrains Mono, Menlo, monospace" font-size="16">
    <text x="40" y="262" fill="#64748b">$</text>
    <text x="58" y="262" fill="#06b6d4">cat</text>
    <text x="92" y="262" fill="#e2e8f0">role.txt</text>
  </g>

  <!-- Tagline with cycling text -->
  <g font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500">
    <text x="40" y="296" fill="#cbd5e1">
      <tspan>
        Java · Spring Boot · Microservices · Fintech
        <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="5s" begin="0s" repeatCount="indefinite"/>
      </tspan>
    </text>
    <text x="40" y="296" fill="#cbd5e1" opacity="0">
      <tspan>
        Building payment systems &amp; KYC pipelines at scale
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.2;0.3;0.9;1" dur="5s" begin="5s" repeatCount="indefinite"/>
      </tspan>
    </text>
    <text x="40" y="296" fill="#cbd5e1" opacity="0">
      <tspan>
        Distributed systems · Cadence workflows · Cloud native
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.2;0.3;0.9;1" dur="5s" begin="10s" repeatCount="indefinite"/>
      </tspan>
    </text>
  </g>

  <!-- Blinking cursor at end -->
  <rect x="42" y="280" width="3" height="20" fill="#3b82f6">
    <animate attributeName="opacity" values="0;1;1;0" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Right-side stats card -->
  <g>
    <rect x="850" y="90" width="310" height="220" rx="12" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
    <rect x="850" y="90" width="310" height="36" rx="12" fill="#1e293b"/>
    <rect x="850" y="118" width="310" height="8" fill="#1e293b"/>
    <text x="868" y="113" font-family="JetBrains Mono, Menlo, monospace" font-size="12" fill="#64748b">▸ ./status.sh</text>

    <!-- Animated underline scan -->
    <rect x="850" y="124" width="60" height="2" fill="url(#accent)" opacity="0.8">
      <animate attributeName="x" values="850;1100;850" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="6s" repeatCount="indefinite"/>
    </rect>

    <g font-family="JetBrains Mono, Menlo, monospace" font-size="13">
      <text x="868" y="156" fill="#64748b">location</text>
      <text x="1140" y="156" text-anchor="end" fill="#e2e8f0">India 🇮🇳</text>

      <text x="868" y="184" fill="#64748b">domain</text>
      <text x="1140" y="184" text-anchor="end" fill="#e2e8f0">Fintech · GovTech</text>

      <text x="868" y="212" fill="#64748b">stack</text>
      <text x="1140" y="212" text-anchor="end" fill="#e2e8f0">Java · Spring · K8s</text>

      <text x="868" y="240" fill="#64748b">role</text>
      <text x="1140" y="240" text-anchor="end" fill="#a5b4fc">
        Team Lead
        <animate attributeName="fill" values="#a5b4fc;#06b6d4;#a5b4fc" dur="3s" repeatCount="indefinite"/>
      </text>

      <text x="868" y="268" fill="#64748b">open_src</text>
      <text x="1140" y="268" text-anchor="end" fill="#e2e8f0">FlowFirst.ai</text>

      <text x="868" y="296" fill="#64748b">status</text>
      <g>
        <circle cx="1080" cy="291" r="4" fill="#22c55e">
          <animate attributeName="r" values="4;6;4" dur="1.5s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="1080" cy="291" r="4" fill="#22c55e"/>
        <text x="1140" y="296" text-anchor="end" fill="#22c55e">open to work</text>
      </g>
    </g>
  </g>
</svg>
